name: Sync from Notion

on:
  # Run every hour
  schedule:
    - cron: '0 * * * *'

  # Allow manual trigger from GitHub Actions tab or mobile app
  workflow_dispatch:

  # Run on push to main (for testing workflow changes)
  push:
    branches:
      - main
    paths:
      - '.github/workflows/notion-sync.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @notionhq/client dotenv aws4

      - name: Sync from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_POSTS_DATABASE_ID: ${{ secrets.NOTION_POSTS_DATABASE_ID }}
          NOTION_GIGS_DATABASE_ID: ${{ secrets.NOTION_GIGS_DATABASE_ID }}
          NOTION_PROJECTS_DATABASE_ID: ${{ secrets.NOTION_PROJECTS_DATABASE_ID }}
          NOTION_PLACES_DATABASE_ID: ${{ secrets.NOTION_PLACES_DATABASE_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: node scripts/notion-sync.js

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Auto-sync from Notion [skip ci]"
          git push

      # Always deploy at the end of the sync run.
      # Two reasons:
      # 1. If sync produced new content, ship it to the edge now (not on
      #    next code push).
      # 2. If sync produced nothing but code has changed since last
      #    deploy, this is a safety net to catch missed deploys.
      # The deploy.yml workflow handles the regular code-push case;
      # this step handles content-only updates that skip CI.
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Wrangler 3.90 (the action's default) is too old for Workers
          # Static Assets projects without a `main` script entry-point.
          # Pin to v4 to match what works locally.
          wranglerVersion: '4'
          command: deploy
