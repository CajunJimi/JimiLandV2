<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>World — JimiLand</title>
    <meta name="description" content="Every place I've been — concerts, museums, walks, camping, trips. Pinned on a map.">
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('jimiland-theme');
          var prefers = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.dataset.theme = saved || prefers;
        } catch (e) { document.documentElement.dataset.theme = 'dark'; }
      })();
    </script>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css">
    <link rel="stylesheet" href="/assets/css/world.css">
</head>
<body class="page-world">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="/">JimiLand</a>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/archive/" class="nav-link">Archive</a>
                <a href="/gigs/" class="nav-link">Gigs</a>
                <a href="/projects/" class="nav-link">Projects</a>
                <a href="/world/" class="nav-link active">World</a>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark theme" type="button">
                    <svg class="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg class="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                </button>
            </div>
            <div class="nav-toggle" id="nav-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="world-main">
        <!-- Thin filter strip above map -->
        <div class="world-toolbar" id="world-toolbar">
            <div class="world-counts">
                <span class="world-title">World</span>
                <span class="world-stat" id="world-stat">Loading…</span>
            </div>
            <div class="world-filters" id="world-filters">
                <!-- Filter chips inserted by JS -->
            </div>
        </div>

        <!-- Full-bleed map -->
        <div class="world-map-wrap">
            <div id="world-map" aria-label="Interactive world map of places visited"></div>
            <div class="world-empty hidden" id="world-empty">
                No places match this filter.
            </div>
        </div>

        <!-- Slide-in details panel -->
        <aside class="world-panel" id="world-panel" aria-hidden="true">
            <button class="world-panel-close" id="world-panel-close" aria-label="Close details" type="button">×</button>
            <div class="world-panel-inner" id="world-panel-inner">
                <!-- Filled by JS on pin click -->
            </div>
        </aside>
    </main>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/world.js"></script>
    <!-- Cloudflare Web Analytics -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "3e7295e321594559995cdb652141e645"}'></script>
    <!-- End Cloudflare Web Analytics -->
</body>
</html>
